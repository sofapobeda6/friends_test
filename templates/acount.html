{% extends "base.html" %}

{% block title %}Вход в аккаунт - Лучший друг{% endblock %}

{% block content %}
<div class="container create-quiz-container">
    <h1>Расскажи о себе</h1>
    <form>
            <p><input type="text" name="userEmail" placeholder="Введите почту" size="18" /></p>
            <p><input type="text" name="userPassword" placeholder="Введите пароль" size="18" maxlength="8" /></p>
            <p>
                <button type="submit">Отправить</button> 
                <button type="reset">Отмена</button>
            </p>
        </form>
    <a href="{{ url_for('index') }}" class="back-button">← На главную</a>
</div>
{% endblock %}
